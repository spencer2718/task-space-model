# Phase 1 Normalized Validation
# Reproduces v0.6.2 result: t ≈ 7.14, R² ≈ 0.00485

name: phase1_normalized
version: "0.6.3"
description: "Normalized kernel overlap validation (Phase I primary result)"

# Data
onet_path: data/onet/db_30_0_excel
oes_path: data/external/oes
output_dir: outputs/experiments

# Similarity
similarity: normalized_kernel
similarity_args: {}

# No shock (validation-only mode)
shock: null
shock_args: {}

# Validation
target: wage_comovement
oes_years: [2019, 2020, 2021, 2022, 2023]
cluster_by: origin

# Controls (empty for primary validation)
controls: []

# Robustness
run_permutation: true
n_permutations: 1000
run_cv: true
n_folds: 5
seed: 42
